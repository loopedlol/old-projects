<!DOCTYPE html>
<html>
    <head>
        <title>The title!</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"/>
        <link rel="stylesheet" href="/static/styles.css">
        <script src="/static/script.js"></script>
    </head>
<body>
    <div class = "wrapper">
        <h3>Account login</h3>
        {% if message %}
        <p class = "error">{{message}}</p>{% endif %}
        <form id = "form" action = "" method = "post">
            <p>
                <input class = "control" type = "text" name = "username" id = "username" placeholder = "enter your username" onkeydown = "validation()"/>
                <span id = "error_username"></span>
            </p>
            <p>
                <input class = "control" type = "password" name = "password" id = "password" required placeholder = "enter your password"/>
                <span id = "error_password"></span>
            </p>
            <p>
                <input type = "submit" class = "button"/>
            </p>
        </form>
    </div>
</body>
</html>
